<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AVP-Py{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">AVP-Py</a>
      <span class="device">{{ config.device_name }}</span>
      <form method="post" action="/logout">
        <button class="ghost" type="submit">Déconnexion</button>
      </form>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
